<!doctype html>
<html lang="zh-HK" data-bs-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d6efd">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>HK Bus ETA</title>
<style>
:root{--ink:#273746;--sub:#66717c;--line:#e8ebef;--blue:#1261a6;--green:#16a34a;--orange:#f59e0b;--card:#fff;--bg:#f3f6f9;--soft:#f7f9fc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;color:var(--ink)}
.app{max-width:980px;margin:0 auto;padding:12px 12px 118px}.top{position:sticky;top:0;z-index:20;background:rgba(243,246,249,.92);backdrop-filter:blur(10px);padding:8px 0 10px}.hero{border-radius:20px;background:#fff;color:var(--ink);padding:16px;box-shadow:0 2px 14px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.03)}.hero h1{margin:0;font-size:25px;font-weight:900}.btn-pill{border-radius:999px}.section-title{font-weight:850;font-size:20px;margin:16px 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}.meta{font-size:12px;color:#727d88}.toolbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tab-section{display:none}.tab-section.active{display:block}
.fav-grid{display:grid;grid-template-columns:1fr;gap:12px}.fav-empty{background:var(--card);border-radius:18px;padding:18px;color:#6c757d;box-shadow:0 2px 12px rgba(0,0,0,.05)}.fav-card{position:relative;background:var(--card);border-radius:20px;padding:16px;box-shadow:0 2px 14px rgba(0,0,0,.07);overflow:hidden;border:1px solid rgba(0,0,0,.03)}.fav-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--blue)}.fav-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.route{font-size:43px;font-weight:900;letter-spacing:-1px;line-height:1;color:var(--ink)}.tag{font-size:12px;font-weight:700;color:#fff;background:#0d6efd;border-radius:999px;padding:3px 8px;margin-left:4px;vertical-align:middle}.dest-wrap{margin-top:8px}.towards{font-size:16px;color:var(--sub);line-height:1}.dest{font-size:30px;font-weight:900;line-height:1.12;color:var(--ink);word-break:keep-all}.stop{font-size:18px;color:#3f4f5d;line-height:1.2;margin-top:5px}.eta-main{text-align:right;min-width:96px}.eta-now{font-size:52px;font-weight:900;line-height:.92;color:var(--blue);letter-spacing:-1px}.eta-unit{font-size:16px;color:var(--sub);margin-top:4px}.eta-now.arrive{font-size:32px;color:var(--green)}.eta-sub{display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap}.eta-chip{display:flex;align-items:center;gap:5px;background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:7px 11px;font-size:15px;font-weight:750;color:var(--ink)}.eta-chip .dot{width:8px;height:8px;border-radius:99px;background:var(--blue)}.eta-chip.fast .dot{background:var(--green)}.eta-chip.mid .dot{background:var(--orange)}.eta-chip.miss{color:#929aa3}.remove{position:absolute;right:8px;bottom:7px;border:0;background:transparent;color:#9aa4ad;font-size:22px;line-height:1}.remove:hover{color:#dc3545}.card{border:0;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}.card-header{background:var(--card);border-bottom:1px solid var(--line);font-weight:850}.stop-list{max-height:370px;overflow:auto}.stop-btn{text-align:left}.stop-name{font-weight:800;color:var(--ink)}.eta-preview{border-radius:16px;background:var(--soft);padding:14px;min-height:105px}.eta-preview .num{font-size:42px;font-weight:900;color:var(--blue);line-height:1}.setting-row{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}.bottom-tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottom-tabs button{flex:1;max-width:220px;text-align:center;border:0;background:transparent;border-radius:999px;padding:9px 10px;font-weight:800;color:var(--ink)}.bottom-tabs button.active{background:#0d6efd;color:#fff}.footer{text-align:center;color:#78838e;font-size:13px;padding:24px 12px 8px}
[data-bs-theme="dark"]{--ink:#e5e7eb;--sub:#a3adb8;--line:#374151;--card:#1f2937;--bg:#111827;--soft:#111827}[data-bs-theme="dark"] .top{background:rgba(17,24,39,.9)}[data-bs-theme="dark"] .hero{background:#1f2937;border-color:#374151}[data-bs-theme="dark"] .bottom-tabs{background:rgba(31,41,55,.94)}
@media(min-width:760px){.fav-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:460px){.app{padding-left:0;padding-right:0}.top{padding-left:12px;padding-right:12px}.section-title{padding:0 12px;align-items:flex-start}.card{border-radius:0;box-shadow:none}.setting-row{border-radius:0}.fav-grid{gap:10px}.fav-card{border-radius:0;border-left:0;border-right:0;padding:14px 12px}.route{font-size:40px}.dest{font-size:27px}.stop{font-size:17px}.eta-main{min-width:82px}.eta-now{font-size:46px}.eta-chip{font-size:14px;padding:6px 9px}}

/* Color theme accents */
:root{--accent:#1261a6;--accent2:#0d6efd;--accentSoft:rgba(13,110,253,.10)}
[data-color-theme="blue"]{--accent:#1261a6;--accent2:#0d6efd;--accentSoft:rgba(13,110,253,.10)}
[data-color-theme="ocean"]{--accent:#0284c7;--accent2:#06b6d4;--accentSoft:rgba(6,182,212,.12)}
[data-color-theme="emerald"]{--accent:#059669;--accent2:#10b981;--accentSoft:rgba(16,185,129,.12)}
[data-color-theme="sunset"]{--accent:#ea580c;--accent2:#f97316;--accentSoft:rgba(249,115,22,.13)}
[data-color-theme="purple"]{--accent:#7c3aed;--accent2:#8b5cf6;--accentSoft:rgba(139,92,246,.13)}
[data-color-theme="rose"]{--accent:#e11d48;--accent2:#f43f5e;--accentSoft:rgba(244,63,94,.12)}
[data-color-theme="slate"]{--accent:#334155;--accent2:#64748b;--accentSoft:rgba(100,116,139,.14)}
.hero{border-top:4px solid var(--accent2)}
.fav-card:before{background:var(--accent)!important}.eta-now{color:var(--accent)!important}.eta-preview .num{color:var(--accent)!important}.bottom-tabs button.active{background:var(--accent2)!important}.btn-primary{background-color:var(--accent2)!important;border-color:var(--accent2)!important}.tag{background:var(--accent2)!important}.eta-chip .dot{background:var(--accent)!important}
.upcoming-box{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;background:linear-gradient(180deg,transparent,var(--accentSoft));border-radius:0 0 14px 14px}
.upcoming-title{font-size:13px;font-weight:850;color:var(--sub);letter-spacing:.2px;margin-bottom:6px;text-transform:none}
.upcoming-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:5px 0;font-size:15px}
.upcoming-label{font-weight:800;color:var(--ink)}
.upcoming-time{font-weight:900;color:var(--accent);font-size:17px;white-space:nowrap}


/* Compact favourite cards */
.fav-grid{gap:8px!important}
.fav-card{padding:12px 42px 12px 14px!important;border-radius:16px!important;min-height:auto!important}
.fav-head{align-items:flex-start!important;gap:8px!important}
.route{font-size:34px!important;line-height:.95!important}
.tag{font-size:10px!important;padding:2px 6px!important;margin-left:3px!important}
.dest-wrap{margin-top:4px!important}
.towards{display:none!important}
.dest{font-size:24px!important;line-height:1.05!important;margin-top:0!important}
.stop{font-size:15px!important;line-height:1.15!important;margin-top:3px!important;color:#485866!important}
.eta-main{min-width:70px!important;text-align:right!important;padding-right:2px!important}
.eta-now{font-size:42px!important;line-height:.9!important}
.eta-now.arrive{font-size:25px!important}
.eta-unit{font-size:13px!important;margin-top:2px!important}
.upcoming-box{margin-top:8px!important;padding-top:7px!important;border-top:1px solid var(--line)!important;background:transparent!important;border-radius:0!important}
.upcoming-title{display:none!important}
.upcoming-one-line{font-size:13px!important;color:var(--sub)!important;font-weight:750!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
.upcoming-one-line strong{color:var(--accent)!important;font-weight:900!important}
.remove{top:9px!important;right:9px!important;bottom:auto!important;width:30px!important;height:30px!important;border-radius:50%!important;background:#f1f5f9!important;color:#64748b!important;font-size:22px!important;font-weight:800!important;display:flex!important;align-items:center!important;justify-content:center!important;line-height:1!important;box-shadow:0 1px 4px rgba(0,0,0,.08)!important}
.remove:hover,.remove:focus{background:#fee2e2!important;color:#dc2626!important;outline:none!important}
[data-bs-theme="dark"] .remove{background:#374151!important;color:#cbd5e1!important}
[data-bs-theme="dark"] .remove:hover,[data-bs-theme="dark"] .remove:focus{background:#7f1d1d!important;color:#fecaca!important}
@media(max-width:460px){.fav-card{border-radius:0!important;padding:11px 42px 11px 12px!important}.route{font-size:33px!important}.dest{font-size:23px!important}.eta-now{font-size:40px!important}.stop{font-size:15px!important}.upcoming-one-line{font-size:13px!important}}


/* Favourite sorting and distance */
.dist-tag{font-size:10px;font-weight:800;color:var(--accent)!important;background:var(--accentSoft)!important;border:1px solid rgba(0,0,0,.04);border-radius:999px;padding:2px 6px;margin-left:4px;vertical-align:middle;white-space:nowrap}
.sort-note{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.35}


/* Manual favourite ordering */
.fav-sort-panel{background:var(--card);border-radius:14px;margin:0 0 10px;box-shadow:0 1px 8px rgba(0,0,0,.04);padding-top:10px!important}
.manual-controls{display:flex;gap:4px;margin-top:8px}
.order-btn{border:1px solid var(--line);background:var(--soft);color:var(--ink);border-radius:999px;font-size:12px;font-weight:900;line-height:1;padding:5px 8px;min-width:34px}
.order-btn:disabled{opacity:.35}
.order-label{font-size:11px;color:var(--sub);font-weight:800;align-self:center;margin-right:2px}
@media(max-width:460px){.fav-sort-panel{border-radius:0;margin-bottom:8px}.manual-controls{margin-top:6px}.order-btn{padding:5px 8px}}


/* Drag & drop manual sorting */
.drag-handle{position:absolute;right:9px;bottom:9px;width:30px;height:30px;border:1px solid var(--line);border-radius:50%;background:var(--soft);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;cursor:grab;touch-action:none;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:3}
.drag-handle:active{cursor:grabbing;background:var(--accentSoft);color:var(--accent)}
.fav-card.dragging{opacity:.55;transform:scale(.985)}
.fav-card.drag-over{outline:2px dashed var(--accent);outline-offset:-5px;background:linear-gradient(180deg,var(--card),var(--accentSoft))}
.manual-controls{display:none!important}


/* Settings sort and refresh */
#nearbyLocationPanel{border:1px solid var(--line);border-radius:14px;padding:12px;background:var(--soft)}
.current-location-line{font-weight:800;color:var(--ink)}


/* Nearby route stop display */
.stop-section-title{font-size:12px;font-weight:900;color:var(--sub);background:var(--soft);padding:7px 12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);letter-spacing:.2px}
.stop-distance{font-weight:900;color:var(--accent);font-size:12px;white-space:nowrap}
.stop-nearby{background:linear-gradient(90deg,var(--accentSoft),transparent)!important}

</style>
</head>
<body>
<div class="app">
 <div class="top"><div class="hero"><div class="d-flex justify-content-between align-items-center gap-2"><h1>HK Bus ETA</h1><button id="installBtn" class="btn btn-primary btn-sm btn-pill d-none">Install</button></div></div></div>
 <div id="alertBox"></div>
 <section id="favSection" class="tab-section active"><div class="section-title"><span data-i18n="favouriteRoutes">常用路線</span><span class="meta" id="favRefreshText">Loading...</span></div><div class="meta px-3 pb-2"><span id="nextRefreshText">Next: 30s</span></div><div class="fav-grid" id="favBoard"></div></section>
 <section id="searchSection" class="tab-section"><div class="section-title"><span data-i18n="search">搜尋</span></div>
  <div class="card mb-3"><div class="card-header" data-i18n="searchRouteStop">搜尋路線 / 車站</div><div class="card-body"><div class="row g-2">
   <div class="col-12 col-md-4"><label class="form-label" data-i18n="operator">營辦商</label><select id="operator" class="form-select"><option value="KMB">KMB / LWB</option><option value="CTB">Citybus</option><option value="GMB">Green Minibus</option></select></div>
   <div class="col-6 col-md-3 d-none" id="gmbRegionWrap"><label class="form-label" data-i18n="gmbRegion">小巴地區</label><select id="gmbRegion" class="form-select"><option value="HKI">HKI</option><option value="KLN">KLN</option><option value="NT">NT</option></select></div>
   <div class="col-6 col-md-3"><label class="form-label" data-i18n="direction">方向</label><select id="direction" class="form-select"><option value="outbound" data-i18n="outbound">去程</option><option value="inbound" data-i18n="inbound">回程</option></select></div>
   <div class="col-6 col-md-2"><label class="form-label" data-i18n="serviceType">服務類別</label><input id="serviceType" class="form-control" value="1"></div>
   <div class="col-12 col-md-4"><label class="form-label" data-i18n="route">路線</label><input id="routeInput" class="form-control" placeholder="2X / 6D / 118" list="routeList"><datalist id="routeList"></datalist></div>
  </div><div id="gmbVariantWrap" class="d-none mt-3"><label class="form-label" data-i18n="gmbVariant">小巴路線分支 / 方向</label><select id="gmbVariant" class="form-select"></select></div><button id="loadStopsBtn" class="btn btn-primary w-100 mt-3" data-i18n="loadStops">載入車站</button></div></div>
  <div class="card mb-3"><div class="card-header d-flex justify-content-between"><span data-i18n="routeStops">路線車站</span><span class="badge text-bg-secondary" id="stopCount">0</span></div><div class="card-body"><input id="stopSearch" class="form-control mb-3"><div id="selectedStop" class="alert alert-secondary d-none"></div></div><div class="list-group list-group-flush stop-list" id="stops"></div></div>
  <div class="card mb-3"><div class="card-header" data-i18n="selectedEta">已選車站到站時間</div><div class="card-body"><div id="etaHeader" class="text-secondary mb-3"></div><div id="etaResult" class="row g-2"></div><div class="d-flex gap-2 mt-3"><button id="getEtaBtn" class="btn btn-success flex-fill" disabled data-i18n="getEta">查詢到站</button><button id="addFavBtn" class="btn btn-warning flex-fill" disabled data-i18n="addFavourite">加入常用</button></div></div></div>
  <div class="card mb-3"><div class="card-header d-flex justify-content-between"><span data-i18n="nearbyStops">附近車站</span><button id="nearbyBtn" class="btn btn-sm btn-outline-primary" data-i18n="findNearby">尋找附近</button></div><div class="list-group list-group-flush" id="nearbyResult"></div></div>
 </section>
 <section id="settingSection" class="tab-section"><div class="section-title"><span data-i18n="settings">設定</span></div>
  <div class="setting-row mb-3"><label class="form-label fw-bold" data-i18n="language">語言</label><select id="langSelect" class="form-select"><option value="zh">繁體中文</option><option value="en">English</option></select></div>
  <div class="setting-row mb-3"><label class="form-label fw-bold" data-i18n="appearance">外觀</label><select id="themeSelect" class="form-select"><option value="light" data-i18n="lightMode">淺色模式</option><option value="dark" data-i18n="darkMode">深色模式</option></select></div>
  <div class="setting-row mb-3"><label class="form-label fw-bold" data-i18n="colorTheme">主題色彩</label><select id="colorThemeSelect" class="form-select"><option value="blue" data-i18n="themeBlue">藍色</option><option value="ocean" data-i18n="themeOcean">海洋</option><option value="emerald" data-i18n="themeEmerald">翡翠</option><option value="sunset" data-i18n="themeSunset">日落</option><option value="purple" data-i18n="themePurple">紫色</option><option value="rose" data-i18n="themeRose">玫瑰</option><option value="slate" data-i18n="themeSlate">石板灰</option></select></div>

  <div class="setting-row mb-3">
    <label class="form-label fw-bold" data-i18n="favouriteSorting">常用路線排序</label>
    <select id="sortModeSelect" class="form-select">
      <option value="manual" data-i18n="sortManual">手動排序</option>
      <option value="route" data-i18n="sortRoute">路線號碼</option>
      <option value="eta" data-i18n="sortEta">最快到站</option>
      <option value="nearby" data-i18n="sortNearby">附近車站優先</option>
    </select>
    <div id="nearbyLocationPanel" class="mt-3 d-none">
      <div class="fw-bold" data-i18n="currentLocation">目前位置</div>
      <div id="currentLocationText" class="meta mt-1">--</div>
      <button id="locationSortBtn" class="btn btn-outline-primary w-100 mt-2" data-i18n="refreshLocation">更新目前位置</button>
    </div>
    <div class="sort-note mt-2" id="locationStatus" data-i18n="locationSortNote">選擇「附近車站優先」後，可使用目前位置將較近的常用車站排在前面。</div>
  </div>
  <div class="setting-row mb-3">
    <label class="form-label fw-bold" data-i18n="refreshInterval">自動更新時間</label>
    <select id="refreshIntervalSelect" class="form-select">
      <option value="15">15 秒</option>
      <option value="30">30 秒</option>
      <option value="60">60 秒</option>
      <option value="120">120 秒</option>
    </select>
  </div>
  <div class="setting-row mb-3"><div class="fw-bold mb-2" data-i18n="backupRestore">備份及還原</div><div class="d-flex gap-2"><button id="exportBtn" class="btn btn-outline-primary flex-fill" data-i18n="export">匯出</button><button id="importBtn" class="btn btn-outline-success flex-fill" data-i18n="import">匯入</button><input id="importFile" type="file" accept=".json,application/json" hidden></div><div class="meta mt-2" data-i18n="backupNote">匯出檔案會包含常用路線、語言、外觀、排序及自動更新設定。</div></div>
  <footer class="footer"><span id="copyrightText"></span></footer>
 </section>
</div>
<nav class="bottom-tabs"><button type="button" class="active" data-tab="favSection" data-i18n="routesTab">路線</button><button type="button" data-tab="searchSection" data-i18n="searchTab">搜尋</button><button type="button" data-tab="settingSection" data-i18n="settingsTab">設定</button></nav>
<script>
const API={KMB:'https://data.etabus.gov.hk/v1/transport/kmb',CTB:'https://rt.data.gov.hk/v2/transport/citybus',GMB:'https://data.etagmb.gov.hk'};const STORE='hkbus.favourites';const CONFIG='hkbus.config';const $=id=>document.getElementById(id);const state={routes:[],stops:[],selectedStop:null,kmbStopMap:new Map(),ctbStopCache:new Map(),knownStops:[],stopCoordMap:new Map()};let countdown=30;
const i18n={zh:{favouriteRoutes:'常用路線',search:'搜尋',settings:'設定',settingsTab:'設定',searchRouteStop:'搜尋路線 / 車站',operator:'營辦商',gmbRegion:'小巴地區',direction:'方向',outbound:'去程',inbound:'回程',serviceType:'服務類別',route:'路線',gmbVariant:'小巴路線分支 / 方向',loadStops:'載入車站',routeStops:'路線車站',selectedEta:'已選車站到站時間',getEta:'查詢到站',addFavourite:'加入常用',nearbyStops:'附近車站',nearbyRouteStops:'附近車站',allRouteStops:'全部車站',findNearby:'尋找附近',routesTab:'常用',searchTab:'搜尋',language:'語言',appearance:'外觀',lightMode:'淺色模式',darkMode:'深色模式',colorTheme:'主題色彩',themeBlue:'藍色',themeOcean:'海洋',themeEmerald:'翡翠',themeSunset:'日落',themePurple:'紫色',themeRose:'玫瑰',themeSlate:'石板灰',upcoming:'稍後班次',secondBus:'第2班',thirdBus:'第3班',favouriteSorting:'常用路線排序',sortManual:'手動排序',sortRoute:'路線號碼',sortEta:'最快到站',sortNearby:'附近車站優先',useCurrentLocation:'使用目前位置排序',locationSortNote:'選擇「附近車站優先」後，可使用目前位置將較近的常用車站排在前面。',locationUpdated:'已更新目前位置',locationUnavailable:'無法取得目前位置',currentLocation:'目前位置',locationName:'位置名稱',refreshLocation:'更新目前位置',refreshInterval:'自動更新時間',refreshEvery:'每',seconds:'秒',distance:'距離',manualOrder:'手動排序',moveUp:'上移',moveDown:'下移',dragToSort:'拖拉排序',backupRestore:'備份及還原',export:'匯出',import:'匯入',backupNote:'匯出檔案會包含常用路線、語言、外觀、排序及自動更新設定。',emptyFav:'尚未加入常用路線。請於搜尋區選擇車站後加入常用。',selected:'已選擇',mins:'分鐘',arrive:'到站',towards:'往',updated:'更新',next:'下次',noFav:'沒有常用路線',loading:'載入中',invalidFile:'匯入檔案格式無效',imported:'匯入完成',noEta:'沒有到站資料',selectStop:'請先選擇車站。',stopPlaceholder:'搜尋車站名稱，例如：淘大 / Amoy'},en:{favouriteRoutes:'Favourite Routes',search:'Search',settings:'Settings',settingsTab:'Settings',searchRouteStop:'Search Route / Stop',operator:'Operator',gmbRegion:'GMB Region',direction:'Direction',outbound:'Outbound',inbound:'Inbound',serviceType:'Service Type',route:'Route',gmbVariant:'GMB Variant / Direction',loadStops:'Load Stops',routeStops:'Route Stops',selectedEta:'Selected Stop ETA',getEta:'Get ETA',addFavourite:'Add Favourite',nearbyStops:'Nearby Stops',nearbyRouteStops:'Nearby Stops',allRouteStops:'All Stops',findNearby:'Find Nearby',routesTab:'Favourite',searchTab:'Search',language:'Language',appearance:'Appearance',lightMode:'Light Mode',darkMode:'Dark Mode',colorTheme:'Color Theme',themeBlue:'Blue',themeOcean:'Ocean',themeEmerald:'Emerald',themeSunset:'Sunset',themePurple:'Purple',themeRose:'Rose',themeSlate:'Slate',upcoming:'Upcoming Arrivals',secondBus:'2nd Bus',thirdBus:'3rd Bus',favouriteSorting:'Favourite Sorting',sortManual:'Manual Order',sortRoute:'Route Number',sortEta:'Earliest ETA',sortNearby:'Nearby Stop First',useCurrentLocation:'Use Current Location',locationSortNote:'Select Nearby Stop First and use your current location to show closer favourite stops first.',locationUpdated:'Current location updated',locationUnavailable:'Unable to get current location',currentLocation:'Current Location',locationName:'Location Name',refreshLocation:'Refresh Location',refreshInterval:'Auto Refresh Interval',refreshEvery:'Every',seconds:'sec',distance:'Distance',manualOrder:'Manual',moveUp:'Up',moveDown:'Down',dragToSort:'Drag to sort',backupRestore:'Backup and Restore',export:'Export',import:'Import',backupNote:'Export file includes favourite routes, language, appearance, sorting and auto-refresh settings.',emptyFav:'No favourite routes yet. Use Search, select a stop, then add it to favourites.',selected:'Selected',mins:'min',arrive:'Arriving',towards:'To',updated:'Updated',next:'Next',noFav:'No favourites',loading:'Loading',invalidFile:'Invalid import file',imported:'Import completed',noEta:'No ETA available',selectStop:'Please select a stop first.',stopPlaceholder:'Search stop name, e.g. 淘大 / Amoy'}};
function config(){try{return JSON.parse(localStorage.getItem(CONFIG)||'{}')}catch{return{}}}function saveConfig(c){localStorage.setItem(CONFIG,JSON.stringify(c))}function lang(){return config().lang||'zh'}function t(k){return (i18n[lang()]||i18n.zh)[k]||k}function updateCopyright(){const y=new Date().getFullYear();const el=$('copyrightText');if(el)el.textContent=lang()==='zh'?`版權所有 © ${y} GCW`:`Copyright © ${y} GCW. All rights reserved.`}function applyLang(){document.documentElement.lang=lang()==='zh'?'zh-HK':'en';document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));$('langSelect').value=lang();$('stopSearch').placeholder=t('stopPlaceholder');$('etaHeader').textContent=t('selectStop');$('nearbyResult').innerHTML=`<div class="list-group-item text-secondary">${t('selectStop')}</div>`;renderStops();refreshFavouriteBoard();updateCopyright();applySortMode();applyRefreshInterval()}function applyTheme(){const th=config().theme||'light';document.documentElement.setAttribute('data-bs-theme',th);$('themeSelect').value=th}function applyColorTheme(){const ct=config().colorTheme||'blue';document.documentElement.setAttribute('data-color-theme',ct);const el=$('colorThemeSelect');if(el)el.value=ct}function applySortMode(){const sm=config().sortMode||'manual';const el=$('sortModeSelect');if(el)el.value=sm;const panel=$('nearbyLocationPanel');if(panel)panel.classList.toggle('d-none',sm!=='nearby');updateLocationDisplay()}function updateLocationDisplay(){const loc=config().location;const text=$('currentLocationText');const status=$('locationStatus');if(loc&&Number.isFinite(Number(loc.lat))&&Number.isFinite(Number(loc.lng))){const time=loc.updatedAt?new Date(loc.updatedAt).toLocaleString('en-HK'):'--';const name=loc.name?`<div class="current-location-line">${esc(loc.name)}</div>`:'';if(text)text.innerHTML=`${name}<div>${Number(loc.lat).toFixed(6)}, ${Number(loc.lng).toFixed(6)}</div><div>${t('updated')}: ${time}</div>`;if(status)status.textContent=`${t('locationUpdated')}: ${time}`}else{if(text)text.textContent='--';if(status)status.textContent=t('locationSortNote')}}async function reverseGeocodeName(lat,lng){try{const language=lang()==='zh'?'zh-HK':'en';const url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}&accept-language=${language}`;const r=await fetch(url,{headers:{'Accept':'application/json'}});if(!r.ok)return '';const d=await r.json();return d.name||d.display_name||''}catch{return ''}}function autoRefreshLocationOnLoad(){const c=config();if((c.sortMode||'manual')==='nearby')setTimeout(()=>updateCurrentLocation(true),300)}function getRefreshInterval(){return Number(config().refreshInterval||60)}function applyRefreshInterval(){const el=$('refreshIntervalSelect');if(el)el.value=String(getRefreshInterval())}function alertMsg(m,type='info'){$('alertBox').innerHTML=`<div class="alert alert-${type} alert-dismissible fade show mt-2" role="alert">${m}<button class="btn-close" data-bs-dismiss="alert"></button></div>`}async function getJson(u){const r=await fetch(u);if(!r.ok)throw new Error(`${r.status} ${r.statusText}`);return await r.json()}function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}function kmbDirWord(){return $('direction').value==='outbound'?'outbound':'inbound'}function kmbDirCode(){return $('direction').value==='outbound'?'O':'I'}function toMin(ts){if(!ts)return '-';const m=Math.round((new Date(ts)-new Date())/60000);return m<=0?t('arrive'):String(m)}function unit(v){return v===t('arrive')||v==='-'?'':t('mins')}function chipClass(v){const n=parseInt(v,10);if(v===t('arrive')||n<=3)return'fast';if(n<=8)return'mid';if(v==='-')return'miss';return''}function display(obj,tc,en){return lang()==='zh'?(obj[tc]||obj[en]||'--'):(obj[en]||obj[tc]||'--')}function addKnownStop(op,id,nameTc,nameEn,lat,lng){lat=Number(lat);lng=Number(lng);if(!lat||!lng)return;const key=`${op}:${id}`;state.stopCoordMap.set(key,{lat,lng});if(!state.knownStops.some(x=>x.key===key))state.knownStops.push({key,op,id,nameTc,nameEn,lat,lng})}function haversine(a,b,c,d){const R=6371000,toRad=x=>x*Math.PI/180;const dLat=toRad(c-a),dLon=toRad(d-b);const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function showTab(id){document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.bottom-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));window.scrollTo({top:0,behavior:'smooth'});}
async function loadRoutes(){const op=$('operator').value;$('routeList').innerHTML='';$('gmbRegionWrap').classList.toggle('d-none',op!=='GMB');$('gmbVariantWrap').classList.add('d-none');try{if(op==='KMB'){const j=await getJson(`${API.KMB}/route/`);state.routes=j.data||[];[...new Set(state.routes.map(x=>x.route))].sort().forEach(r=>$('routeList').insertAdjacentHTML('beforeend',`<option value="${esc(r)}">`))}else if(op==='CTB'){const j=await getJson(`${API.CTB}/route/CTB`);state.routes=Array.isArray(j.data)?j.data:[j.data].filter(Boolean);[...new Set(state.routes.map(x=>x.route))].sort().forEach(r=>$('routeList').insertAdjacentHTML('beforeend',`<option value="${esc(r)}">`))}else{const j=await getJson(`${API.GMB}/route/${$('gmbRegion').value}`);state.routes=(j.data&&j.data.routes)||[];state.routes.forEach(r=>$('routeList').insertAdjacentHTML('beforeend',`<option value="${esc(r)}">`))}}catch(e){alertMsg(e.message,'danger')}}async function loadKmbStopMap(){if(state.kmbStopMap.size)return;const j=await getJson(`${API.KMB}/stop`);(j.data||[]).forEach(s=>{state.kmbStopMap.set(s.stop,s);addKnownStop('KMB',s.stop,s.name_tc,s.name_en,s.lat,s.long)})}
async function loadStops(){const op=$('operator').value,route=$('routeInput').value.trim().toUpperCase();if(!route)return alertMsg(t('route'),'warning');$('stops').innerHTML=`<div class="list-group-item">${t('loading')}...</div>`;state.selectedStop=null;updateSelectedStop();try{if(op==='KMB'){await loadKmbStopMap();const j=await getJson(`${API.KMB}/route-stop/${route}/${kmbDirWord()}/${$('serviceType').value.trim()||'1'}`);const ro=(state.routes||[]).find(x=>x.route===route&&x.bound===kmbDirCode())||{};state.stops=(j.data||[]).map(x=>{const s=state.kmbStopMap.get(x.stop)||{};return{...x,op:'KMB',route,serviceType:$('serviceType').value.trim()||'1',direction:$('direction').value,stopId:x.stop,seq:x.seq,nameTc:s.name_tc||x.stop,nameEn:s.name_en||'',lat:Number(s.lat),lng:Number(s.long),destTc:ro.dest_tc||'',destEn:ro.dest_en||''}})}else if(op==='CTB'){const j=await getJson(`${API.CTB}/route-stop/CTB/${route}/${$('direction').value}`);state.stops=[];for(const x of(j.data||[])){let s=state.ctbStopCache.get(x.stop);if(!s){const sj=await getJson(`${API.CTB}/stop/${x.stop}`);s=sj.data;state.ctbStopCache.set(x.stop,s);addKnownStop('CTB',s.stop,s.name_tc,s.name_en,s.lat,s.long)}state.stops.push({...x,op:'CTB',route,serviceType:'',direction:$('direction').value,stopId:x.stop,seq:x.seq,nameTc:s.name_tc,nameEn:s.name_en,lat:Number(s.lat),lng:Number(s.long),destTc:x.dest_tc||'',destEn:x.dest_en||''})}}else{const region=$('gmbRegion').value,info=await getJson(`${API.GMB}/route/${region}/${encodeURIComponent(route)}`),opts=[];(info.data||[]).forEach(v=>(v.directions||[]).forEach(d=>opts.push({route_id:v.route_id,route_seq:d.route_seq,destTc:d.dest_tc||'',destEn:d.dest_en||'',text:`${v.description_tc||v.description_en||'Normal'} / ${d.orig_tc||d.orig_en} → ${d.dest_tc||d.dest_en}`})));$('gmbVariant').innerHTML=opts.map(o=>`<option value="${o.route_id}|${o.route_seq}|${esc(o.destTc)}|${esc(o.destEn)}">${esc(o.text)}</option>`).join('');$('gmbVariantWrap').classList.remove('d-none');if(!opts[0])throw new Error('No route direction found.');await loadGmbStops(opts[0].route_id,opts[0].route_seq,opts[0].destTc,opts[0].destEn);return}renderStops()}catch(e){$('stops').innerHTML='';alertMsg(e.message,'danger')}}async function loadGmbStops(routeId,routeSeq,destTc,destEn){const route=$('routeInput').value.trim().toUpperCase();const j=await getJson(`${API.GMB}/route-stop/${routeId}/${routeSeq}`);state.stops=((j.data&&j.data.route_stops)||[]).map(x=>({...x,op:'GMB',route,route_id:routeId,route_seq:routeSeq,direction:'',serviceType:'',stopId:String(x.stop_id),seq:x.stop_seq,nameTc:x.name_tc,nameEn:x.name_en,destTc,destEn}));for(const s of state.stops){try{const sj=await getJson(`${API.GMB}/stop/${s.stopId}`);const p=sj.data?.coordinates?.wgs84;if(p){s.lat=Number(p.latitude);s.lng=Number(p.longitude);addKnownStop('GMB',s.stopId,s.nameTc,s.nameEn,p.latitude,p.longitude)}}catch{}}renderStops()}

function currentLocation(){const loc=config().location;return loc&&Number.isFinite(Number(loc.lat))&&Number.isFinite(Number(loc.lng))?{lat:Number(loc.lat),lng:Number(loc.lng)}:null}
function getStopDistance(s){const loc=currentLocation();if(!loc)return Infinity;let lat=Number(s.lat),lng=Number(s.lng);if(!Number.isFinite(lat)||!Number.isFinite(lng)){const c=state.stopCoordMap?.get(`${s.op}:${s.stopId}`);if(c){lat=c.lat;lng=c.lng}}
return Number.isFinite(lat)&&Number.isFinite(lng)?haversine(loc.lat,loc.lng,lat,lng):Infinity}
function stopButtonHtml(s,idx,near=false){const d=getStopDistance(s);const dist=Number.isFinite(d)?`<span class="stop-distance">${distanceText(d)}</span>`:'';return `<button class="list-group-item list-group-item-action stop-btn ${near?'stop-nearby':''}" onclick="selectStop(${idx})"><div class="d-flex justify-content-between gap-2"><span class="stop-name"><span class="badge text-bg-primary me-2">#${esc(s.seq)}</span>${esc(display(s,'nameTc','nameEn'))}</span>${dist||`<small>${esc(s.stopId)}</small>`}</div><div class="text-secondary small">${esc(lang()==='zh'?s.nameEn:s.nameTc||'')} ${dist?`/ ${esc(s.stopId)}`:''}</div></button>`}
function renderStops(){if(!state.stops)return;const q=$('stopSearch').value.trim().toLowerCase();const rows=state.stops.filter(s=>`${s.nameTc||''} ${s.nameEn||''} ${s.stopId}`.toLowerCase().includes(q));$('stopCount').textContent=rows.length;if(!rows.length){$('stops').innerHTML=`<div class="list-group-item text-secondary">${t('noEta')}</div>`;return}const loc=currentLocation();let htmlParts=[];if(loc){const nearby=rows.map(s=>({s,idx:state.stops.indexOf(s),dist:getStopDistance(s)})).filter(x=>Number.isFinite(x.dist)).sort((a,b)=>a.dist-b.dist).slice(0,5);if(nearby.length){htmlParts.push(`<div class="stop-section-title">${t('nearbyRouteStops')}</div>`);htmlParts.push(nearby.map(x=>stopButtonHtml(x.s,x.idx,true)).join(''))}}htmlParts.push(`<div class="stop-section-title">${t('allRouteStops')}</div>`);htmlParts.push(rows.map(s=>stopButtonHtml(s,state.stops.indexOf(s),false)).join(''));$('stops').innerHTML=htmlParts.join('')}window.selectStop=i=>{state.selectedStop=state.stops[i];updateSelectedStop();getSelectedEta()};function updateSelectedStop(){const s=state.selectedStop;$('getEtaBtn').disabled=!s;$('addFavBtn').disabled=!s;$('selectedStop').classList.toggle('d-none',!s);if(s)$('selectedStop').innerHTML=`${t('selected')}: <b>${esc(display(s,'nameTc','nameEn'))}</b><br><span class="text-secondary small">${esc(s.stopId)}</span>`}
async function getEtasForFav(f){try{let arr=[];if(f.op==='KMB'){const j=await getJson(`${API.KMB}/eta/${f.stopId}/${f.route}/${f.serviceType||'1'}`);arr=(j.data||[]).filter(x=>(!f.direction)||x.dir===(f.direction==='outbound'?'O':'I')||!x.dir).filter(x=>x.eta).slice(0,3).map(x=>toMin(x.eta))}else if(f.op==='CTB'){const j=await getJson(`${API.CTB}/eta/CTB/${f.stopId}/${f.route}`);arr=(j.data||[]).filter(x=>x.eta).slice(0,3).map(x=>toMin(x.eta));const first=(j.data||[]).find(x=>x.dest_tc||x.dest_en);if(first){f.destTc=f.destTc||first.dest_tc;f.destEn=f.destEn||first.dest_en}}else{const j=await getJson(`${API.GMB}/eta/route-stop/${f.route_id}/${f.route_seq}/${f.seq}`);arr=(j.data?.eta||[]).filter(x=>x.timestamp).slice(0,3).map(x=>toMin(x.timestamp))}while(arr.length<3)arr.push('-');return arr}catch{return['-','-','-']}}
async function getSelectedEta(){const s=state.selectedStop;if(!s)return;$('etaHeader').innerHTML=`<b>${esc(s.route)}</b> / ${esc(display(s,'nameTc','nameEn'))}`;$('etaResult').innerHTML=`<div class="col-12 text-secondary">${t('loading')}...</div>`;try{let arr=[];if(s.op==='KMB'){const j=await getJson(`${API.KMB}/eta/${s.stopId}/${s.route}/${s.serviceType||'1'}`);arr=(j.data||[]).filter(x=>x.dir===(s.direction==='outbound'?'O':'I')||!x.dir).map(x=>x.eta)}else if(s.op==='CTB'){const j=await getJson(`${API.CTB}/eta/CTB/${s.stopId}/${s.route}`);arr=(j.data||[]).map(x=>x.eta);const first=(j.data||[]).find(x=>x.dest_tc||x.dest_en);if(first){s.destTc=first.dest_tc||s.destTc;s.destEn=first.dest_en||s.destEn}}else{const j=await getJson(`${API.GMB}/eta/route-stop/${s.route_id}/${s.route_seq}/${s.seq}`);arr=(j.data?.eta||[]).map(x=>x.timestamp)}$('etaResult').innerHTML=arr.filter(Boolean).slice(0,3).map((ts,i)=>{const m=toMin(ts);return`<div class="col-4"><div class="eta-preview text-center"><div class="small text-secondary">${i+1}</div><div class="num">${esc(m)}</div><div>${esc(unit(m))}</div><div class="small text-secondary">${new Date(ts).toLocaleTimeString('en-HK',{hour:'2-digit',minute:'2-digit'})}</div></div></div>`}).join('')||`<div class="col-12 text-secondary">${t('noEta')}</div>`}catch(e){alertMsg(e.message,'danger')}}function getFavs(){try{return JSON.parse(localStorage.getItem(STORE)||'[]')}catch{return[]}}function saveFavs(l){localStorage.setItem(STORE,JSON.stringify(l))}function addFavourite(){const s=state.selectedStop;if(!s)return;const f={op:s.op,route:s.route,stopId:s.stopId,stopName:s.nameTc||s.nameEn,stopNameTc:s.nameTc,stopNameEn:s.nameEn,destTc:s.destTc||'',destEn:s.destEn||'',serviceType:s.serviceType||'1',direction:s.direction,seq:s.seq,route_id:s.route_id,route_seq:s.route_seq,lat:s.lat||s.latitude,lng:s.lng||s.long||s.longitude};const l=getFavs().filter(x=>!(x.op===f.op&&x.route===f.route&&x.stopId===f.stopId&&x.seq===f.seq));l.unshift(f);saveFavs(l.slice(0,30));refreshFavouriteBoard();showTab('favSection')}window.removeFavourite=i=>{const l=getFavs();const f=l[i];if(!f)return;const name=`${f.route} ${favDest(f)} - ${favStop(f)}`;const msg=lang()==='zh'?`確定要刪除此常用路線？\n\n${name}`:`Remove this favourite route?\n\n${name}`;if(!confirm(msg))return;l.splice(i,1);saveFavs(l);refreshFavouriteBoard()};function moveFavourite(i,delta){const l=getFavs();const ni=i+delta;if(ni<0||ni>=l.length)return;const tmp=l[i];l[i]=l[ni];l[ni]=tmp;saveFavs(l);refreshFavouriteBoard()}
function reorderFavourite(from,to){const l=getFavs();if(from===to||from<0||to<0||from>=l.length||to>=l.length)return;const [item]=l.splice(from,1);l.splice(to,0,item);saveFavs(l);refreshFavouriteBoard()}
let manualDrag=null;
function startManualDrag(ev,idx){if(getSortMode()!=='manual')return;ev.preventDefault();const card=ev.target.closest('.fav-card');if(!card)return;manualDrag={from:idx,card};card.classList.add('dragging');try{ev.target.setPointerCapture(ev.pointerId)}catch{}document.addEventListener('pointermove',onManualDragMove);document.addEventListener('pointerup',endManualDrag,{once:true});}
function onManualDragMove(ev){if(!manualDrag)return;document.querySelectorAll('.fav-card.drag-over').forEach(x=>x.classList.remove('drag-over'));const els=document.elementsFromPoint(ev.clientX,ev.clientY);const target=els.map(e=>e.closest&&e.closest('.fav-card')).find(e=>e&&e!==manualDrag.card);if(target)target.classList.add('drag-over');}
function endManualDrag(ev){if(!manualDrag)return;document.removeEventListener('pointermove',onManualDragMove);const els=document.elementsFromPoint(ev.clientX,ev.clientY);const target=els.map(e=>e.closest&&e.closest('.fav-card')).find(e=>e&&e!==manualDrag.card);const from=manualDrag.from;document.querySelectorAll('.fav-card.dragging,.fav-card.drag-over').forEach(x=>x.classList.remove('dragging','drag-over'));manualDrag=null;if(target){const to=Number(target.dataset.favIndex);if(Number.isFinite(to))reorderFavourite(from,to);}}


function parseEtaForSort(v){if(v===t('arrive'))return 0;const n=parseInt(v,10);return Number.isFinite(n)?n:99999}
function getSortMode(){return config().sortMode||'manual'}
function distanceText(m){if(!Number.isFinite(m))return '';return m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}
async function ensureFavCoords(f){if(Number.isFinite(Number(f.lat))&&Number.isFinite(Number(f.lng)))return f;try{if(f.op==='KMB'){const j=await getJson(`${API.KMB}/stop/${f.stopId}`);const d=j.data||{};f.lat=Number(d.lat);f.lng=Number(d.long)}else if(f.op==='CTB'){const j=await getJson(`${API.CTB}/stop/${f.stopId}`);const d=j.data||{};f.lat=Number(d.lat);f.lng=Number(d.long)}else if(f.op==='GMB'){const j=await getJson(`${API.GMB}/stop/${f.stopId}`);const p=j.data?.coordinates?.wgs84;if(p){f.lat=Number(p.latitude);f.lng=Number(p.longitude)}}}catch{}return f}
function distanceBadge(f){return Number.isFinite(f._distance)?`<span class="dist-tag">${distanceText(f._distance)}</span>`:''}
async function getSortedFavouriteItems(){const originals=getFavs();let items=originals.map((f,idx)=>({f,idx,etas:null}));const mode=getSortMode();if(mode==='route'){items.sort((a,b)=>String(a.f.route).localeCompare(String(b.f.route),undefined,{numeric:true,sensitivity:'base'}));return items}if(mode==='eta'){await Promise.all(items.map(async it=>{it.etas=await getEtasForFav(it.f)}));items.sort((a,b)=>parseEtaForSort(a.etas?.[0])-parseEtaForSort(b.etas?.[0]));return items}if(mode==='nearby'){const loc=config().location;if(loc&&Number.isFinite(Number(loc.lat))&&Number.isFinite(Number(loc.lng))){let changed=false;await Promise.all(items.map(async it=>{const before=it.f.lat&&it.f.lng;await ensureFavCoords(it.f);if(!before&&it.f.lat&&it.f.lng)changed=true;it.f._distance=(Number.isFinite(Number(it.f.lat))&&Number.isFinite(Number(it.f.lng)))?haversine(Number(loc.lat),Number(loc.lng),Number(it.f.lat),Number(it.f.lng)):Infinity}));if(changed){saveFavs(originals.map(f=>{const c={...f};delete c._distance;return c}))}items.sort((a,b)=>(a.f._distance??Infinity)-(b.f._distance??Infinity));}return items}return items}
function updateCurrentLocation(silent=false){if(!navigator.geolocation){if(!silent)alertMsg(t('locationUnavailable'),'warning');return}navigator.geolocation.getCurrentPosition(async p=>{const c=config();let location={lat:p.coords.latitude,lng:p.coords.longitude,updatedAt:new Date().toISOString()};const name=await reverseGeocodeName(location.lat,location.lng);if(name)location.name=name;c.location=location;c.sortMode='nearby';saveConfig(c);applySortMode();refreshFavouriteBoard();if(!silent)alertMsg(t('locationUpdated'),'success')},()=>{if(!silent)alertMsg(t('locationUnavailable'),'danger')},{enableHighAccuracy:true,timeout:10000,maximumAge:0})}
function favDest(f){return lang()==='zh'?(f.destTc||f.destination||f.destEn||'--'):(f.destEn||f.destTc||f.destination||'--')}function favStop(f){return lang()==='zh'?(f.stopNameTc||f.stopName||f.stopNameEn||'--'):(f.stopNameEn||f.stopNameTc||f.stopName||'--')}function manualControls(origIdx){if(getSortMode()!=='manual')return '';return `<button class="drag-handle" aria-label="${t('dragToSort')}" title="${t('dragToSort')}" onpointerdown="startManualDrag(event,${origIdx})">☰</button>`}function favCard(f,i,origIdx=i){return`<div class="fav-card" data-fav-index="${origIdx}"><button class="remove" aria-label="Remove" onclick="removeFavourite(${origIdx})">×</button><div class="fav-head"><div><div class="route">${esc(f.route)}<span class="tag">${esc(f.op)}</span>${distanceBadge(f)}</div><div class="dest-wrap"><div class="dest">${esc(favDest(f))}</div><div class="stop">${esc(favStop(f))}</div></div></div><div class="eta-main"><div class="eta-now" id="eta0-${i}">...</div><div class="eta-unit" id="unit0-${i}">${t('mins')}</div></div></div><div class="upcoming-box" id="chips-${i}"><div class="upcoming-one-line">${t('loading')}...</div></div>${manualControls(origIdx)}</div>`}
async function refreshFavouriteBoard(){const b=$('favBoard'),favs=getFavs();if(!favs.length){b.innerHTML=`<div class="fav-empty">${t('emptyFav')}</div>`;$('favRefreshText').textContent=t('noFav');return}const items=await getSortedFavouriteItems();b.innerHTML=items.map((it,i)=>favCard(it.f,i,it.idx)).join('');await Promise.all(items.map(async(it,i)=>{const e=it.etas||await getEtasForFav(it.f),now=e[0];const nowEl=$(`eta0-${i}`),unitEl=$(`unit0-${i}`),chips=$(`chips-${i}`);if(nowEl){nowEl.textContent=now;nowEl.classList.toggle('arrive',now===t('arrive'));unitEl.textContent=unit(now);chips.innerHTML=`<div class="upcoming-one-line">${t('upcoming')}: <strong>${t('secondBus')}</strong> ${esc(e[1])}${unit(e[1])?' '+esc(unit(e[1])):''} <span class="text-secondary">•</span> <strong>${t('thirdBus')}</strong> ${esc(e[2])}${unit(e[2])?' '+esc(unit(e[2])):''}</div>`}}));$('favRefreshText').textContent=`${t('updated')} ${new Date().toLocaleTimeString('en-HK',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;countdown=30}let refreshTimer=null;function startRefresh(){if(refreshTimer)clearInterval(refreshTimer);countdown=getRefreshInterval();refreshFavouriteBoard();refreshTimer=setInterval(()=>{countdown--;if(countdown<=0){refreshFavouriteBoard();countdown=getRefreshInterval()}$('nextRefreshText').textContent=`${t('next')}: ${Math.max(countdown,0)}s`},1000)}function findNearby(){if(!navigator.geolocation)return alertMsg('Geolocation is not supported.','warning');if($('operator').value==='KMB')loadKmbStopMap().catch(()=>{});navigator.geolocation.getCurrentPosition(p=>{const{latitude,longitude}=p.coords;const near=state.knownStops.map(s=>({...s,dist:haversine(latitude,longitude,s.lat,s.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,10);window._nearbyStops=near;$('nearbyResult').innerHTML=near.map((s,i)=>`<button class="list-group-item list-group-item-action" onclick="searchNearbyKnown(${i})"><span class="badge text-bg-secondary me-2">${esc(s.op)}</span>${esc(lang()==='zh'?(s.nameTc||s.nameEn||s.id):(s.nameEn||s.nameTc||s.id))}<span class="float-end">${Math.round(s.dist)}m</span><div class="small text-secondary">${esc(s.id)}</div></button>`).join('')},e=>alertMsg(e.message,'danger'))}
window.searchNearbyKnown=i=>{const s=(window._nearbyStops||[])[i];if(!s)return;showTab('searchSection');const nm=lang()==='zh'?(s.nameTc||s.nameEn||s.id):(s.nameEn||s.nameTc||s.id);$('stopSearch').value=nm;renderStops();const idx=state.stops.findIndex(x=>x.stopId===s.id||x.nameTc===s.nameTc||x.nameEn===s.nameEn);if(idx>=0)selectStop(idx)};
function exportData(){const data={app:'HK Bus ETA',version:2,exportedAt:new Date().toISOString(),config:config(),favourites:getFavs()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='hk-bus-eta-backup.json';a.click();URL.revokeObjectURL(url)}function importData(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const favs=Array.isArray(obj)?obj:(obj.favourites||[]);const cfg=obj.config||{};if(!Array.isArray(favs))throw new Error('bad');saveFavs(favs);saveConfig({lang:cfg.lang||lang(),theme:cfg.theme||config().theme||'light',colorTheme:cfg.colorTheme||config().colorTheme||'blue',sortMode:cfg.sortMode||config().sortMode||'manual',location:cfg.location||config().location,refreshInterval:cfg.refreshInterval||config().refreshInterval||60});applyTheme();applyColorTheme();applySortMode();applyLang();refreshFavouriteBoard();showTab('favSection');alertMsg(t('imported'),'success')}catch{alertMsg(t('invalidFile'),'danger')}finally{ev.target.value=''}};reader.readAsText(file)}
$('operator').addEventListener('change',loadRoutes);$('gmbRegion').addEventListener('change',loadRoutes);$('loadStopsBtn').addEventListener('click',loadStops);$('stopSearch').addEventListener('input',renderStops);$('getEtaBtn').addEventListener('click',getSelectedEta);$('addFavBtn').addEventListener('click',addFavourite);$('nearbyBtn').addEventListener('click',findNearby);$('gmbVariant').addEventListener('change',e=>{const[rid,seq,tc,en]=e.target.value.split('|');loadGmbStops(rid,seq,tc,en)});$('themeSelect').addEventListener('change',e=>{const c=config();c.theme=e.target.value;saveConfig(c);applyTheme()});$('colorThemeSelect').addEventListener('change',e=>{const c=config();c.colorTheme=e.target.value;saveConfig(c);applyColorTheme();refreshFavouriteBoard()});$('sortModeSelect').addEventListener('change',e=>{const c=config();c.sortMode=e.target.value;saveConfig(c);applySortMode();if(e.target.value==='nearby'&&!c.location)updateCurrentLocation();else refreshFavouriteBoard()});$('locationSortBtn').addEventListener('click',updateCurrentLocation);$('refreshIntervalSelect').addEventListener('change',e=>{const c=config();c.refreshInterval=Number(e.target.value)||60;saveConfig(c);applyRefreshInterval();startRefresh()});$('langSelect').addEventListener('change',e=>{const c=config();c.lang=e.target.value;saveConfig(c);applyLang()});$('exportBtn').addEventListener('click',exportData);$('importBtn').addEventListener('click',()=>$('importFile').click());$('importFile').addEventListener('change',importData);document.querySelectorAll('.bottom-tabs button').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));let deferredPrompt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('installBtn').classList.remove('d-none')});$('installBtn').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;$('installBtn').classList.add('d-none')}});if(location.protocol==='http:'||location.protocol==='https:'){const mf=document.createElement('link');mf.rel='manifest';mf.href='manifest.json';document.head.appendChild(mf);if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});}if(!config().lang&&!config().theme&&!config().colorTheme&&!config().sortMode&&!config().refreshInterval)saveConfig({lang:'zh',theme:'light',colorTheme:'blue',sortMode:'manual',refreshInterval:60});applyTheme();applyColorTheme();applySortMode();applyRefreshInterval();applyLang();loadRoutes();startRefresh();autoRefreshLocationOnLoad();
