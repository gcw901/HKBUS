<style>
:root{--bg:#f3f6f9;--card:#fff;--ink:#263746;--sub:#687584;--line:#e8edf2;--accent:#1261a6;--accent2:#0d6efd;--accentSoft:rgba(13,110,253,.10);--green:#16a34a;--orange:#f59e0b}
[data-color-theme=blue]{--accent:#1261a6;--accent2:#0d6efd;--accentSoft:rgba(13,110,253,.10)}[data-color-theme=ocean]{--accent:#0284c7;--accent2:#06b6d4;--accentSoft:rgba(6,182,212,.12)}[data-color-theme=emerald]{--accent:#059669;--accent2:#10b981;--accentSoft:rgba(16,185,129,.12)}[data-color-theme=sunset]{--accent:#ea580c;--accent2:#f97316;--accentSoft:rgba(249,115,22,.13)}[data-color-theme=purple]{--accent:#7c3aed;--accent2:#8b5cf6;--accentSoft:rgba(139,92,246,.13)}[data-color-theme=rose]{--accent:#e11d48;--accent2:#f43f5e;--accentSoft:rgba(244,63,94,.12)}
[data-bs-theme=dark]{--bg:#111827;--card:#1f2937;--ink:#e5e7eb;--sub:#a3adb8;--line:#374151;--accentSoft:rgba(255,255,255,.08)}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;color:var(--ink)}.app{max-width:980px;margin:0 auto;padding:12px 12px 118px}.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(10px);padding:8px 0 10px}.hero{border-radius:20px;background:var(--card);padding:16px;box-shadow:0 2px 14px rgba(0,0,0,.08);border-top:4px solid var(--accent2)}.hero h1{margin:0;font-size:25px;font-weight:900}.tab-section{display:none}.tab-section.active{display:block}.section-title{font-size:20px;font-weight:900;margin:16px 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px}.meta{font-size:12px;color:var(--sub)}.card,.setting-row{background:var(--card);border:0;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}.card-header{background:var(--card);border-bottom:1px solid var(--line);font-weight:850}.btn-primary{background:var(--accent2)!important;border-color:var(--accent2)!important}.btn-pill{border-radius:999px}.fav-grid{display:grid;grid-template-columns:1fr;gap:8px}.fav-card{position:relative;background:var(--card);border-radius:16px;padding:12px 42px 12px 14px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid rgba(0,0,0,.03);overflow:hidden}.fav-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent)}.fav-head{display:flex;justify-content:space-between;gap:8px}.route{font-size:34px;font-weight:900;line-height:.95;color:var(--ink)}.tag{font-size:10px;font-weight:800;color:#fff;background:var(--accent2);border-radius:999px;padding:2px 6px;margin-left:3px;vertical-align:middle}.dist-tag{font-size:10px;font-weight:800;color:var(--accent);background:var(--accentSoft);border-radius:999px;padding:2px 6px;margin-left:4px;vertical-align:middle}.dest{font-size:23px;font-weight:900;line-height:1.05;margin-top:4px}.stop{font-size:15px;color:#52616f;line-height:1.15;margin-top:3px}.eta-main{text-align:right;min-width:72px}.eta-now{font-size:42px;font-weight:900;line-height:.9;color:var(--accent)}.eta-now.arrive{font-size:25px;color:var(--green)}.eta-unit{font-size:13px;color:var(--sub);margin-top:2px}.upcoming-box{margin-top:8px;padding-top:7px;border-top:1px solid var(--line)}.eta-combined{display:flex;gap:6px;flex-wrap:wrap;font-size:13px;font-weight:850}.eta-pill{background:var(--accentSoft);border:1px solid var(--line);border-radius:999px;padding:4px 8px}.eta-pill b{color:var(--accent)}.remove{position:absolute;top:9px;right:9px;width:30px;height:30px;border-radius:50%;border:0;background:#f1f5f9;color:#64748b;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1}.remove:hover{background:#fee2e2;color:#dc2626}.drag-handle{position:absolute;right:9px;bottom:9px;width:30px;height:30px;border:1px solid var(--line);border-radius:50%;background:var(--accentSoft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;cursor:grab;touch-action:none}.fav-card.dragging{opacity:.55;transform:scale(.985)}.fav-card.drag-over{outline:2px dashed var(--accent);outline-offset:-5px}.stop-list{max-height:370px;overflow:auto}.stop-btn{text-align:left}.stop-name{font-weight:850}.stop-section-title{font-size:12px;font-weight:900;color:var(--sub);background:var(--accentSoft);padding:7px 12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.stop-distance{font-weight:900;color:var(--accent);font-size:12px;white-space:nowrap}.stop-nearby{background:linear-gradient(90deg,var(--accentSoft),transparent)!important}.eta-preview{border-radius:16px;background:var(--accentSoft);padding:14px;min-height:105px}.eta-preview .num{font-size:38px;font-weight:900;color:var(--accent);line-height:1}.bottom-tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}.bottom-tabs button{flex:1;max-width:220px;border:0;background:transparent;border-radius:999px;padding:9px 10px;font-weight:850;color:var(--ink)}.bottom-tabs button.active{background:var(--accent2);color:#fff}.setting-row{padding:16px;margin-bottom:12px}.footer{text-align:center;color:var(--sub);font-size:13px;padding:24px 12px 8px}#nearbyLocationPanel{border:1px solid var(--line);border-radius:14px;padding:12px;background:var(--accentSoft)}.current-location-line{font-weight:850;color:var(--ink)}
@media(min-width:760px){.fav-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:460px){.app{padding-left:0;padding-right:0}.top{padding-left:12px;padding-right:12px}.section-title{padding:0 12px}.card,.setting-row,.fav-card{border-radius:0;box-shadow:none}.route{font-size:33px}.dest{font-size:22px}.eta-now{font-size:39px}}

/* Operator badges */
.op-badge{font-size:10px;font-weight:900;border-radius:999px;padding:2px 6px;margin-left:3px;vertical-align:middle;display:inline-block;line-height:1.25}
.op-kmb{background:#d6001c!important;color:#ffffff!important}
.op-ctb{background:#ffd400!important;color:#0057b8!important}
.op-gmb{background:#16a34a!important;color:#ffffff!important}
.eta-pill.op-kmb,.eta-pill.op-ctb,.eta-pill.op-gmb{border:0!important;font-weight:900}
.eta-pill.op-kmb b,.eta-pill.op-gmb b{color:#ffffff!important}
.eta-pill.op-ctb b{color:#0057b8!important}


/* Current operator badge sizing */
.op-badge{min-width:auto;white-space:nowrap}

<body>
<div class="app">
 <div class="top"><div class="hero"><div class="d-flex justify-content-between align-items-center gap-2"><h1>HK Bus ETA</h1><button id="installBtn" class="btn btn-primary btn-sm btn-pill d-none">Install</button></div></div></div>
 <div id="alertBox"></div>
 <section id="favSection" class="tab-section active"><div class="section-title"><span data-i18n="favouriteRoutes">常用路線</span><span class="meta" id="favRefreshText">Loading...</span></div><div class="meta px-3 pb-2"><span id="nextRefreshText">Next: 60s</span></div><div class="fav-grid" id="favBoard"></div></section>
 <section id="searchSection" class="tab-section"><div class="section-title"><span data-i18n="search">搜尋</span></div>
  <div class="card mb-3"><div class="card-header" data-i18n="searchRouteStop">搜尋路線 / 車站</div><div class="card-body"><div class="row g-2">
   <div class="col-12 col-md-4"><label class="form-label" data-i18n="operator">營辦商</label><select id="operator" class="form-select"><option value="KMB">KMB / LWB</option><option value="CTB">Citybus</option><option value="GMB">Green Minibus</option></select></div>
   <div class="col-6 col-md-3 d-none" id="gmbRegionWrap"><label class="form-label" data-i18n="gmbRegion">小巴地區</label><select id="gmbRegion" class="form-select"><option value="HKI">HKI</option><option value="KLN">KLN</option><option value="NT">NT</option></select></div>
   <div class="col-6 col-md-3"><label class="form-label" data-i18n="direction">方向</label><select id="direction" class="form-select"><option value="outbound" data-i18n="outbound">去程</option><option value="inbound" data-i18n="inbound">回程</option></select></div>
   <div class="col-6 col-md-2"><label class="form-label" data-i18n="serviceType">服務類別</label><input id="serviceType" class="form-control" value="1"></div>
   <div class="col-12 col-md-4"><label class="form-label" data-i18n="route">路線</label><input id="routeInput" class="form-control" placeholder="118 / 2X / 6D" list="routeList"><datalist id="routeList"></datalist></div>
  </div><div id="gmbVariantWrap" class="d-none mt-3"><label class="form-label" data-i18n="gmbVariant">小巴路線分支 / 方向</label><select id="gmbVariant" class="form-select"></select></div><button id="loadStopsBtn" class="btn btn-primary w-100 mt-3" data-i18n="loadStops">載入車站</button></div></div>
  <div class="card mb-3"><div class="card-header d-flex justify-content-between"><span data-i18n="routeStops">路線車站</span><span class="badge text-bg-secondary" id="stopCount">0</span></div><div class="card-body"><input id="stopSearch" class="form-control mb-3"><div id="selectedStop" class="alert alert-secondary d-none"></div></div><div class="list-group list-group-flush stop-list" id="stops"></div></div>
  <div class="card mb-3"><div class="card-header" data-i18n="selectedEta">已選車站到站時間</div><div class="card-body"><div id="etaHeader" class="text-secondary mb-3"></div><div id="etaResult" class="row g-2"></div><div class="d-flex gap-2 mt-3"><button id="getEtaBtn" class="btn btn-success flex-fill" disabled data-i18n="getEta">查詢到站</button><button id="addFavBtn" class="btn btn-warning flex-fill" disabled data-i18n="addFavourite">加入常用</button></div></div></div>
  <div class="card mb-3"><div class="card-header d-flex justify-content-between"><span data-i18n="nearbyStops">附近車站</span><button id="nearbyBtn" class="btn btn-sm btn-outline-primary" data-i18n="findNearby">尋找附近</button></div><div class="list-group list-group-flush" id="nearbyResult"></div></div>
 </section>
 <section id="settingSection" class="tab-section"><div class="section-title"><span data-i18n="settings">設定</span></div>
  <div class="setting-row"><label class="form-label fw-bold" data-i18n="language">語言</label><select id="langSelect" class="form-select"><option value="zh">繁體中文</option><option value="en">English</option></select></div>
  <div class="setting-row"><label class="form-label fw-bold" data-i18n="appearance">外觀</label><select id="themeSelect" class="form-select"><option value="light" data-i18n="lightMode">淺色模式</option><option value="dark" data-i18n="darkMode">深色模式</option></select></div>
  <div class="setting-row"><label class="form-label fw-bold" data-i18n="colorTheme">主題色彩</label><select id="colorThemeSelect" class="form-select"><option value="blue" data-i18n="themeBlue">藍色</option><option value="ocean" data-i18n="themeOcean">海洋</option><option value="emerald" data-i18n="themeEmerald">翡翠</option><option value="sunset" data-i18n="themeSunset">日落</option><option value="purple" data-i18n="themePurple">紫色</option><option value="rose" data-i18n="themeRose">玫瑰</option></select></div>
  <div class="setting-row"><label class="form-label fw-bold" data-i18n="favouriteSorting">常用路線排序</label><select id="sortModeSelect" class="form-select"><option value="manual" data-i18n="sortManual">手動排序</option><option value="route" data-i18n="sortRoute">路線號碼</option><option value="eta" data-i18n="sortEta">最快到站</option><option value="nearby" data-i18n="sortNearby">附近車站優先</option></select><div id="nearbyLocationPanel" class="mt-3 d-none"><div class="fw-bold" data-i18n="currentLocation">目前位置</div><div id="currentLocationText" class="meta mt-1">--</div><button id="locationSortBtn" class="btn btn-outline-primary w-100 mt-2" data-i18n="refreshLocation">更新目前位置</button></div><div class="meta mt-2" id="locationStatus" data-i18n="locationSortNote">選擇「附近車站優先」後，可使用目前位置將較近的常用車站排在前面。</div></div>
  <div class="setting-row"><label class="form-label fw-bold" data-i18n="refreshInterval">自動更新時間</label><select id="refreshIntervalSelect" class="form-select"><option value="15">15 秒</option><option value="30">30 秒</option><option value="60">60 秒</option><option value="120">120 秒</option></select></div>
  <div class="setting-row"><div class="fw-bold mb-2" data-i18n="backupRestore">備份及還原</div><div class="d-flex gap-2"><button id="exportBtn" class="btn btn-outline-primary flex-fill" data-i18n="export">匯出</button><button id="importBtn" class="btn btn-outline-success flex-fill" data-i18n="import">匯入</button><input id="importFile" type="file" accept=".json,application/json" hidden></div><div class="meta mt-2" data-i18n="backupNote">匯出檔案會包含常用路線、語言、外觀、排序及自動更新設定。</div></div>
  <footer class="footer"><span id="copyrightText"></span></footer>
 </section>
</div>
<nav class="bottom-tabs"><button type="button" class="active" data-tab="favSection" data-i18n="routesTab">常用</button><button type="button" data-tab="searchSection" data-i18n="searchTab">搜尋</button><button type="button" data-tab="settingSection" data-i18n="settingsTab">設定</button></nav>
<script>
const API={KMB:'https://data.etabus.gov.hk/v1/transport/kmb',CTB:'https://rt.data.gov.hk/v2/transport/citybus',GMB:'https://data.etagmb.gov.hk'};const STORE='hkbus.favourites';const CONFIG='hkbus.config';const $=id=>document.getElementById(id);const state={routes:[],stops:[],selectedStop:null,kmbStopMap:new Map(),ctbStopCache:new Map(),knownStops:[],stopCoordMap:new Map()};let countdown=60,refreshTimer=null,manualDrag=null;
const i18n={zh:{favouriteRoutes:'常用路線',search:'搜尋',settings:'設定',settingsTab:'設定',searchRouteStop:'搜尋路線 / 車站',operator:'營辦商',gmbRegion:'小巴地區',direction:'方向',outbound:'去程',inbound:'回程',serviceType:'服務類別',route:'路線',gmbVariant:'小巴路線分支 / 方向',loadStops:'載入車站',routeStops:'路線車站',selectedEta:'已選車站到站時間',getEta:'查詢到站',addFavourite:'加入常用',nearbyStops:'附近車站',nearbyRouteStops:'附近車站',allRouteStops:'全部車站',findNearby:'尋找附近',routesTab:'常用',searchTab:'搜尋',language:'語言',appearance:'外觀',lightMode:'淺色模式',darkMode:'深色模式',colorTheme:'主題色彩',themeBlue:'藍色',themeOcean:'海洋',themeEmerald:'翡翠',themeSunset:'日落',themePurple:'紫色',themeRose:'玫瑰',favouriteSorting:'常用路線排序',sortManual:'手動排序',sortRoute:'路線號碼',sortEta:'最快到站',sortNearby:'附近車站優先',currentLocation:'目前位置',refreshLocation:'更新目前位置',locationSortNote:'選擇「附近車站優先」後，可使用目前位置將較近的常用車站排在前面。',locationUpdated:'已更新目前位置',locationUnavailable:'無法取得目前位置',refreshInterval:'自動更新時間',backupRestore:'備份及還原',export:'匯出',import:'匯入',backupNote:'匯出檔案會包含常用路線、語言、外觀、排序及自動更新設定。',emptyFav:'尚未加入常用路線。請於搜尋區選擇車站後加入常用。',selected:'已選擇',mins:'分鐘',arrive:'到站',towards:'往',updated:'更新',next:'下次',noFav:'沒有常用路線',loading:'載入中',invalidFile:'匯入檔案格式無效',imported:'匯入完成',noEta:'沒有到站資料',selectStop:'請先選擇車站。',stopPlaceholder:'搜尋車站名稱，例如：淘大 / Amoy',combined:'合併'},en:{favouriteRoutes:'Favourite Routes',search:'Search',settings:'Settings',settingsTab:'Settings',searchRouteStop:'Search Route / Stop',operator:'Operator',gmbRegion:'GMB Region',direction:'Direction',outbound:'Outbound',inbound:'Inbound',serviceType:'Service Type',route:'Route',gmbVariant:'GMB Variant / Direction',loadStops:'Load Stops',routeStops:'Route Stops',selectedEta:'Selected Stop ETA',getEta:'Get ETA',addFavourite:'Add Favourite',nearbyStops:'Nearby Stops',nearbyRouteStops:'Nearby Stops',allRouteStops:'All Stops',findNearby:'Find Nearby',routesTab:'Favourite',searchTab:'Search',language:'Language',appearance:'Appearance',lightMode:'Light Mode',darkMode:'Dark Mode',colorTheme:'Color Theme',themeBlue:'Blue',themeOcean:'Ocean',themeEmerald:'Emerald',themeSunset:'Sunset',themePurple:'Purple',themeRose:'Rose',favouriteSorting:'Favourite Sorting',sortManual:'Manual Order',sortRoute:'Route Number',sortEta:'Earliest ETA',sortNearby:'Nearby Stop First',currentLocation:'Current Location',refreshLocation:'Refresh Location',locationSortNote:'Use current location to show closer favourites first.',locationUpdated:'Current location updated',locationUnavailable:'Unable to get current location',refreshInterval:'Auto Refresh Interval',backupRestore:'Backup and Restore',export:'Export',import:'Import',backupNote:'Export file includes favourite routes, language, appearance, sorting and auto-refresh settings.',emptyFav:'No favourite routes yet. Use Search, select a stop, then add it to favourites.',selected:'Selected',mins:'min',arrive:'Arriving',towards:'To',updated:'Updated',next:'Next',noFav:'No favourites',loading:'Loading',invalidFile:'Invalid import file',imported:'Import completed',noEta:'No ETA available',selectStop:'Please select a stop first.',stopPlaceholder:'Search stop name, e.g. 淘大 / Amoy',combined:'Combined'}};
function config(){try{return JSON.parse(localStorage.getItem(CONFIG)||'{}')}catch{return{}}}function saveConfig(c){localStorage.setItem(CONFIG,JSON.stringify(c))}function lang(){return config().lang||'zh'}function t(k){return (i18n[lang()]||i18n.zh)[k]||k}function updateCopyright(){const y=new Date().getFullYear();$('copyrightText').textContent=lang()==='zh'?`版權所有 © ${y} GCW`:`Copyright © ${y} GCW. All rights reserved.`}function alertMsg(m,type='info'){$('alertBox').innerHTML=`<div class="alert alert-${type} alert-dismissible fade show mt-2" role="alert">${m}<button class="btn-close" data-bs-dismiss="alert"></button></div>`}async function getJson(u){const r=await fetch(u);if(!r.ok)throw new Error(`${r.status} ${r.statusText}`);return await r.json()}function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}function kmbDirWord(){return $('direction').value==='outbound'?'outbound':'inbound'}function kmbDirCode(){return $('direction').value==='outbound'?'O':'I'}function toMin(ts){if(!ts)return '-';const m=Math.round((new Date(ts)-new Date())/60000);return m<=0?t('arrive'):String(m)}function unit(v){return v===t('arrive')||v==='-'?'':t('mins')}function display(obj,tc,en){return lang()==='zh'?(obj[tc]||obj[en]||'--'):(obj[en]||obj[tc]||'--')}function currentLocation(){const loc=config().location;return loc&&Number.isFinite(Number(loc.lat))&&Number.isFinite(Number(loc.lng))?{lat:Number(loc.lat),lng:Number(loc.lng)}:null}function haversine(a,b,c,d){const R=6371000,toRad=x=>x*Math.PI/180;const dLat=toRad(c-a),dLon=toRad(d-b);const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}function distanceText(m){return !Number.isFinite(m)?'':m<1000?`${Math.round(m)}m`:`${(m/1000).toFixed(1)}km`}function addKnownStop(op,id,nameTc,nameEn,lat,lng){lat=Number(lat);lng=Number(lng);if(!lat||!lng)return;const key=`${op}:${id}`;state.stopCoordMap.set(key,{l async function refreshFavouriteBoard(){const b=$('favBoard'),favs=getMergedFavs();if(!favs.length){b.innerHTML=`<div class="fav-empty">${t('emptyFav')}</div>`;$('favRefreshText').textContent=t('noFav');return}const items=await getSortedFavouriteItems();b.innerHTML=items.map((it,i)=>favCard(it.f,i,it.idx)).join('');await Promise.all(items.map(async(it,i)=>{const e=it.etas||await getEtasForFav(it.f),now=e[0];const nowEl=$(`eta0-${i}`),unitEl=$(`unit0-${i}`),chips=$(`chips-${i}`);if(nowEl){nowEl.textContent=now.val;nowEl.classList.toggle('arrive',now.val===t('arrive'));unitEl.textContent=unit(now.val);const head=$(`opHead-${i}`);if(head)head.innerHTML=opBadge(now.op);chips.innerHTML=`<div class="eta-combined">${e.map(x=>`<span class="eta-pill ${opClass(x.op)}">${x.op?`<b>${esc(opLabel(x.op))}</b> `:''}${esc(x.val)} ${esc(unit(x.val))}</span>`).join('')}</div>`}}));$('favRefreshText').textContent=`${t('updated')} ${new Date().toLocaleTimeString('en-HK',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;countdown=getRefreshInterval()}function startRefresh(){if(refreshTimer)clearInterval(refreshTimer);countdown=getRefreshInterval();refreshFavouriteBoard();refreshTimer=setInterval(()=>{countdown--;if(countdown<=0)refreshFavouriteBoard();$('nextRefreshText').textContent=`${t('next')}: ${Math.max(countdown,0)}s`},1000)}function findNearby(){if(!navigator.geolocation)return alertMsg('Geolocation is not supported.','warning');if($('operator').value==='KMB')loadKmbStopMap().catch(()=>{});navigator.geolocation.getCurrentPosition(p=>{const{latitude,longitude}=p.coords;const near=state.knownStops.map(s=>({...s,dist:haversine(latitude,longitude,s.lat,s.lng)})).sort((a,b)=>a.dist-b.dist).slice(0,10);window._nearbyStops=near;$('nearbyResult').innerHTML=near.map((s,i)=>`<button class="list-group-item list-group-item-action" onclick="searchNearbyKnown(${i})"><span class="op-badge ${opClass(s.op)} me-2">${esc(opLabel(s.op))}</span>${esc(lang()==='zh'?(s.nameTc||s.nameEn||s.id):(s.nameEn||s.nameTc||s.id))}<span class="float-end">${Math.round(s.dist)}m</span><div class="small text-secondary">${esc(s.id)}</div></button>`).join('')},e=>alertMsg(e.message,'danger'))}window.searchNearbyKnown=i=>{const s=(window._nearbyStops||[])[i];if(!s)return;showTab('searchSection');const nm=lang()==='zh'?(s.nameTc||s.nameEn||s.id):(s.nameEn||s.nameTc||s.id);$('stopSearch').value=nm;renderStops();const idx=state.stops.findIndex(x=>x.stopId===s.id||x.nameTc===s.nameTc||x.nameEn===s.nameEn);if(idx>=0)selectStop(idx)};
function exportData(){const data={app:'HK Bus ETA',version:3,exportedAt:new Date().toISOString(),config:config(),favourites:getMergedFavs()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='hk-bus-eta-backup.json';a.click();URL.revokeObjectURL(url)}function importData(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);const favs=Array.isArray(obj)?obj:(obj.favourites||[]),cfg=obj.config||{};if(!Array.isArray(favs))throw new Error('bad');saveFavs(mergeFavouriteList(favs));saveConfig({lang:cfg.lang||lang(),theme:cfg.theme||config().theme||'light',colorTheme:cfg.colorTheme||config().colorTheme||'blue',sortMode:cfg.sortMode||config().sortMode||'manual',location:cfg.location||config().location,refreshInterval:cfg.refreshInterval||config().refreshInterval||60});applyTheme();applyColorTheme();applySortMode();applyRefreshInterval();applyLang();refreshFavouriteBoard();showTab('favSection');alertMsg(t('imported'),'success')}catch{alertMsg(t('invalidFile'),'danger')}finally{ev.target.value=''}};reader.readAsText(file)}
$('operator').addEventListener('change',loadRoutes);$('gmbRegion').addEventListener('change',loadRoutes);$('loadStopsBtn').addEventListener('click',loadStops);$('stopSearch').addEventListener('input',renderStops);$('getEtaBtn').addEventListener('click',getSelectedEta);$('addFavBtn').addEventListener('click',addFavourite);$('nearbyBtn').addEventListener('click',findNearby);$('gmbVariant').addEventListener('change',e=>{const[rid,seq,tc,en]=e.target.value.split('|');loadGmbStops(rid,seq,tc,en)});$('themeSelect').addEventListener('change',e=>{const c=config();c.theme=e.target.value;saveConfig(c);applyTheme()});$('colorThemeSelect').addEventListener('change',e=>{const c=config();c.colorTheme=e.target.value;saveConfig(c);applyColorTheme();refreshFavouriteBoard()});$('sortModeSelect').addEventListener('change',e=>{const c=config();c.sortMode=e.target.value;saveConfig(c);applySortMode();if(e.target.value==='nearby'&&!c.location)updateCurrentLocation();else refreshFavouriteBoard()});$('locationSortBtn').addEventListener('click',()=>updateCurrentLocation(false));$('refreshIntervalSelect').addEventListener('change',e=>{const c=config();c.refreshInterval=Number(e.target.value)||60;saveConfig(c);applyRefreshInterval();startRefresh()});$('langSelect').addEventListener('change',e=>{const c=config();c.lang=e.target.value;saveConfig(c);applyLang()});$('exportBtn').addEventListener('click',exportData);$('importBtn').addEventListener('click',()=>$('importFile').click());$('importFile').addEventListener('change',importData);document.querySelectorAll('.bottom-tabs button').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));let deferredPrompt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('installBtn').classList.remove('d-none')});$('installBtn').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;$('installBtn').classList.add('d-none')}});if(location.protocol==='http:'||location.protocol===
